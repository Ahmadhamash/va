name: whatsapp-agent-saas

services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_PATH: ""
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BASE_PATH: ""
      WHATSAPP_PROVIDER: MOCK
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      default:
      chatwoot_proxy:
        aliases:
          - whatsapp-agent-saas

networks:
  chatwoot_proxy:
    external: true
