<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Widget Test — AI Business Assistant</title>
    <style>
      body {
        font-family: system-ui, "Segoe UI", sans-serif;
        background: #f4f6fb;
        margin: 0;
        padding: 40px 20px;
        color: #111827;
      }
      .box {
        max-width: 640px;
        margin: 0 auto;
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
        padding: 28px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 6px;
      }
      p {
        color: #6b7280;
        font-size: 14px;
        line-height: 1.7;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        margin: 10px 0;
        direction: ltr;
      }
      button {
        background: #2f56d6;
        color: #fff;
        border: 0;
        padding: 11px 18px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
      }
      code {
        background: #eef2ff;
        padding: 2px 6px;
        border-radius: 5px;
        direction: ltr;
        display: inline-block;
      }
      .ok {
        color: #16a34a;
        font-size: 13px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>🧪 اختبار ودجت الويب</h1>
      <p>
        1. سجّل دخول كـ <strong>client</strong> → صفحة <strong>Channels</strong>
        → أنشئ قناة من نوع <strong>Web widget</strong>.<br />
        2. انسخ قيمة <code>script_url</code> (مثل
        <code>http://localhost:8000/widget/&lt;public_id&gt;.js</code>).<br />
        3. الصقها تحت واضغط "تحميل الودجت" — رح تطلع فقاعة دردشة أسفل الصفحة.
      </p>
      <input
        id="src"
        placeholder="http://localhost:8000/widget/PUBLIC_ID.js"
      />
      <button onclick="loadWidget()">تحميل الودجت</button>
      <div id="status" class="ok"></div>
    </div>

    <script>
      function loadWidget() {
        var url = document.getElementById("src").value.trim();
        if (!url) {
          alert("الصق رابط الـ script أولاً");
          return;
        }
        var s = document.createElement("script");
        s.src = url;
        s.async = true;
        s.onerror = function () {
          document.getElementById("status").textContent =
            "❌ تعذّر تحميل السكربت — تأكد أن النظام شغّال والرابط صحيح.";
          document.getElementById("status").style.color = "#dc2626";
        };
        s.onload = function () {
          document.getElementById("status").textContent =
            "✅ تم التحميل — فقاعة الدردشة ظهرت أسفل يسار/يمين الصفحة.";
        };
        document.body.appendChild(s);
      }
    </script>
  </body>
</html>
